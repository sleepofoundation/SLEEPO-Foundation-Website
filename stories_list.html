<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SLEEPO Stories</title>

<style>
  body{
    font-family:"Segoe UI",Arial,sans-serif;
    background:#f5efe6;
    margin:0;
    padding:0;
    color:#183a54;
  }

  .header{
    text-align:center;
    padding:34px 16px 26px 16px;
    background:linear-gradient(180deg,#0f4c5c,#1b6b7a);
    color:white;
  }

  .logo{
    width:120px;
    margin-bottom:10px;
  }

  .title{
    font-size:26px;
    font-weight:700;
    line-height:1.2;
  }

  .subtitle{
    font-size:15px;
    margin-top:6px;
    opacity:.9;
  }

  /* More usable width on mobile */
  .container{
    max-width:920px;
    margin:0 auto;
    padding:14px 12px 22px 12px;
  }

  /* Story card gives max space to title, button stays compact */
  .storyCard{
    background:white;
    border-radius:14px;
    padding:16px 14px;
    margin-bottom:12px;
    box-shadow:0 4px 14px rgba(0,0,0,0.08);
    display:flex;
    align-items:flex-start;
    gap:12px;
  }

  .storyTitle{
    flex:1 1 auto;         /* take as much space as possible */
    min-width:0;           /* critical so wrapping works in flex */
    font-size:17px;
    font-weight:650;
    line-height:1.25;
    white-space:normal;    /* allow wrap */
    overflow-wrap:anywhere;/* wrap long words */
    word-break:break-word; /* safe fallback */
  }

  button{
    flex:0 0 auto;         /* do not steal space from title */
    border:none;
    cursor:pointer;
    font-size:14px;
    padding:10px 14px;
    border-radius:10px;
    background:#0f4c5c;
    color:white;
    white-space:nowrap;
  }

  .footer{
    text-align:center;
    margin:18px 0 22px 0;
    font-size:13px;
    color:#6b7f8d;
  }

  #sleepOverlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    opacity:0;
    pointer-events:none;
    transition:opacity 10s ease;
    z-index:999;
  }

  /* Small screens: even more title room, slightly smaller button */
  @media (max-width: 420px){
    .storyCard{ padding:14px 12px; }
    .storyTitle{ font-size:16px; }
    button{ font-size:13px; padding:9px 12px; border-radius:10px; }
  }
</style>

</head>

<body>

<div id="sleepOverlay"></div>

<div class="header">
  <img src="assets/sleepo-logo.png" class="logo" alt="SLEEPO Logo">
  <div class="title">
    Personalized SLEEPO Stories for <span id="kidName">Kid Name</span>
  </div>
  <div class="subtitle">
    Press play and let the magic begin ✨
  </div>
</div>

<div class="container">

  <!-- Example story cards (Worker will inject real list) -->
  <div class="storyCard">
    <div class="storyTitle">The Brave Little Star and the Moonlight Adventure</div>
    <button onclick="playStory('/audio/star-story.m4a')">▶ Play</button>
  </div>

  <div class="storyCard">
    <div class="storyTitle">Dreams of the Forest</div>
    <button onclick="playStory('/audio/forest-story.m4a')">▶ Play</button>
  </div>

   <div class="storyCard">
    <div class="storyTitle">कहाँ से आया ये राजकुमार  of the Forest</div>
    <button onclick="playStory('/audio/forest-story.m4a')">▶ Play</button>
  </div>

   <div class="storyCard">
    <div class="storyTitle">Dreams of the Forest</div>
    <button onclick="playStory('/audio/forest-story.m4a')">▶ Play</button>
  </div>
  
</div>

<div class="footer">
  © SLEEPO Foundation
</div>

<audio id="player"></audio>

<script>
  const player = document.getElementById("player");
  const overlay = document.getElementById("sleepOverlay");

  function playStory(url){
    player.src = url;
    player.play();
    startSleepMode();
  }

  function startSleepMode(){
    // Dim after 30 seconds to keep bedtime-friendly
    setTimeout(()=>{ overlay.style.opacity = 0.5; }, 30000);

    // Fade further after story ends
    player.onended = ()=>{ fadeToSleep(); };
  }

  function fadeToSleep(){
    overlay.style.opacity = 0.85;
    setTimeout(()=>{ overlay.style.opacity = 1; }, 180000); // 3 minutes
  }
</script>

</body>
</html>
